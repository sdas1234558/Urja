version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: ecodistrict-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "9051"
      POSTGRES_DB: Userinfo
    ports:
      - "5432:5432"
    volumes:
      - ecodistrict-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ecodistrict-db-data:
    driver: local
